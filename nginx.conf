# no-code-deeplearning/nginx.conf

server {
    listen 80;
    # IMPORTANT: Change this to your public domain name
    server_name dl-api.no-code-deeplearning.app;
    client_max_body_size 10G;

    # Optional: Redirect all HTTP traffic to HTTPS (Recommended for production)
    # return 301 https://$host$request_uri;

    location / {
        # This proxy_pass forwards traffic to the internal FastAPI service,
        # which is named 'api' in our docker-compose file.
        proxy_pass http://api:8000;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

