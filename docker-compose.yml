# no-code-deeplearning-prod/docker-compose.yml

services:
  # 1. The Reverse Proxy (Public-facing)
  proxy:
    image: nginx:latest
    ports:
      - "80:80"    # Public HTTP port
      - "443:443"  # Public HTTPS port
    volumes:
      # Mount our custom NGINX config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # Mount your SSL certificates here
      # - /path/on/host/to/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-net

  # 2. The FastAPI API (Internal-facing)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn fastapi_app:app --host 0.0.0.0 --port 8000
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - app_data:/app/app_data
      - model_outputs:/app/model_outputs
      - training_logs:/tmp/training_logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-net

  # 3. The Redis Broker (Internal-facing)
  redis:
    image: redis:latest
    restart: unless-stopped
    networks:
      - app-net

  # --- 4. The 4 GPU Workers (Internal-facing) ---
  
  worker-0:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app.app worker -n w0@%h --loglevel=info -c 1
    shm_size: '4g'
    volumes:
      - app_data:/app/app_data
      - model_outputs:/app/model_outputs
      - training_logs:/tmp/training_logs
    environment:
      - CUDA_VISIBLE_DEVICES=0 # The worker sees only one GPU, at index 0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['0'] # Assigns HOST GPU #0
    depends_on: [api, redis]
    restart: unless-stopped
    networks: [app-net]

  worker-1:
    build: 
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app.app worker -n w1@%h --loglevel=info -c 1
    shm_size: '4g'
    volumes:
      - app_data:/app/app_data
      - model_outputs:/app/model_outputs
      - training_logs:/tmp/training_logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['1'] # Assigns HOST GPU #1
    depends_on: [api, redis]
    restart: unless-stopped
    networks: [app-net]

  worker-2:
    build: 
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app.app worker -n w2@%h --loglevel=info -c 1
    shm_size: '4g'
    volumes:
      - app_data:/app/app_data
      - model_outputs:/app/model_outputs
      - training_logs:/tmp/training_logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['2']
    depends_on: [api, redis]
    restart: unless-stopped
    networks: [app-net]

  worker-3:
    build: 
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app.app worker -n w3@%h --loglevel=info -c 1
    shm_size: '4g'
    volumes:
      - app_data:/app/app_data
      - model_outputs:/app/model_outputs
      - training_logs:/tmp/training_logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['3']
    depends_on: [api, redis]
    restart: unless-stopped
    networks: [app-net]

# Define the shared network and persistent volumes
networks:
  app-net:
    driver: bridge

volumes:
  app_data:
  model_outputs:
  training_logs: